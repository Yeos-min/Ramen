name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Clean Vite cache
        run: rm -rf node_modules/.vite

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Verify kakao in dist
        run: |
          grep -c "dapi.kakao.com" dist/index.html && echo "OK" || echo "MISSING"
          grep -c "autoload=false" dist/index.html && echo "WARN: autoload=false found" || echo "OK: no autoload=false"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
